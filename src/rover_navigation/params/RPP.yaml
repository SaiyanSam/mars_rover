controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0      
    costmap_update_timeout: 0.30
    
    # --- VELOCITY THRESHOLDS ---
    min_x_velocity_threshold: 0.05  
    min_y_velocity_threshold: 0.001   
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.5          
    
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15        
      yaw_goal_tolerance: 0.3
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # ==========================================================
      # TODO 1 — Tune Cruise Speed
      #
      # Parameter:
      #   desired_linear_vel
      #
      # Controls:
      #   The rover's desired forward speed while following
      #   a planned path.
      #
      # Effects:
      #   - Increase for faster navigation.
      #   - Decrease for smoother, more stable motion.
      #
      # Hint:
      # Typical values range from 0.2 to 0.8 m/s depending on
      # the rover and environment.
      # ==========================================================
      #Change here to tune the cruise speed of the rover. The value is in meters per second (m/s).
      
      desired_linear_vel: 0.2
      
      # --- LOOKAHEAD PARAMETERS ---

      # ==========================================================
      # TODO 2 — Tune Lookahead Distance
      #
      # Parameters:
      #   lookahead_dist
      #   min_lookahead_dist
      #   max_lookahead_dist
      #
      # Controls:
      #   How far ahead on the planned path the controller
      #   selects its tracking point.
      #
      # Effects:
      #   Smaller values:
      #     - More accurate path following.
      #     - Better performance around tight corners.
      #
      #   Larger values:
      #     - Smoother trajectories.
      #     - May cut corners or overshoot sharp turns.
      #
      # Hint:
      # Choose values such that:
      #
      #   min_lookahead_dist < lookahead_dist < max_lookahead_dist
      # ==========================================================

      lookahead_dist: 0.7
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9

      lookahead_time: 1.5
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: true
      
      # --- REVERSING SUPPORT ---
      allow_reversing: true         
      
      # --- APPROACH & SAFETY ---
      min_approach_linear_velocity: 0.10 
      approach_velocity_scaling_dist: 0.8
      use_collision_detection: false 
      
      # --- SPEED REGULATION & CURVATURE ---
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      
      # Match your planner constraints! 
      regulated_linear_scaling_min_radius: 0.45  
      regulated_linear_scaling_min_speed: 0.15   
      
      # --- ROTATION MANDATES ---
      use_rotate_to_heading: false               
      rotate_to_heading_angular_vel: 0.0
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0
      interpolate_curvature_after_goal: true
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 3.0
