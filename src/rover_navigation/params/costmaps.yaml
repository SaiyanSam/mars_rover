local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 3.0          
      publish_frequency: 2.0
      global_frame: "odom"
      robot_base_frame: "base_link"
      use_sim_time: true
      transform_tolerance: 1.0       
      rolling_window: true
      track_unknown_space: true
      # ==========================================================
      # TODO 1 — Tune the Local Costmap Size
      #
      # Parameters:
      #   width
      #   height
      #
      # Controls:
      #   Sets the size of the rolling local costmap centered
      #   on the rover.
      #
      # Effects:
      # • Larger values:
      #     - More surrounding environment is considered.
      #     - Higher computational cost.
      #
      # • Smaller values:
      #     - Faster updates.
      #     - Less information available for obstacle avoidance.
      #
      # Hint:
      # Choose equal width and height values to maintain a
      # square local planning region.
      # ==========================================================

      width: 7
      height: 7

      resolution: 0.05
      footprint: "[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
      plugins: ["voxel_layer", "inflation_layer"]
      always_send_full_costmap: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # ==========================================================
        # TODO 2 — Tune the Inflation Layer - local_costmap
        #
        # Parameters:
        #   inflation_radius
        #   cost_scaling_factor
        #
        # Controls:
        #   Defines the safety buffer around obstacles and how
        #   quickly the obstacle cost decreases with distance.
        #
        # Effects:
        # • Larger inflation_radius:
        #     - Keeps the rover farther from obstacles.
        #     - May block narrow passages.
        #
        # • Smaller inflation_radius:
        #     - Allows tighter navigation.
        #     - Increases collision risk.
        #
        # • Higher cost_scaling_factor:
        #     - Cost drops more rapidly away from obstacles.
        #
        # • Lower cost_scaling_factor:
        #     - Produces a wider high-cost region.
        # ==========================================================

        inflation_radius: 0.3
        cost_scaling_factor: 3.0
  
        
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        publish_voxel_map: true
        origin_z: -0.5
        z_resolution: 0.2
        z_voxels: 10
        unknown_threshold: 15
        mark_threshold: 0
        observation_sources: "laser_scan rgbd_camera"
        
        laser_scan:
          topic: "/scan"
          data_type: "LaserScan"
          sensor_frame: "laser_link"   
          max_obstacle_height: 2.0
          min_obstacle_height: -0.1
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          clearing: true              
          marking: true
          observation_persistence: 0.0
          expected_update_rate: 0.0   

        rgbd_camera:
          topic: "/camera/points"
          data_type: "PointCloud2"
          sensor_frame: "camera_frame"
          max_obstacle_height: 2.0
          min_obstacle_height: -0.5
          obstacle_max_range: 2.5
          obstacle_min_range: 0.3    
          raytrace_max_range: 2.5
          raytrace_min_range: 0.3
          clearing: false             
          marking: true               
          observation_persistence: 0.0  
          expected_update_rate: 0.0   

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: "map"
      robot_base_frame: "base_link"
      use_sim_time: true
      transform_tolerance: 1.0       
      footprint: "[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      always_send_full_costmap: true

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: false  
        topic: "/map"
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"

        # ==========================================================
        # TODO 3 — Tune the Inflation Layer - Global Costmap
        #
        # Parameters:
        #   inflation_radius
        #   cost_scaling_factor
        #
        # Controls:
        #   Defines the safety buffer around obstacles and how
        #   quickly the obstacle cost decreases with distance.
        #
        # Effects:
        # • Larger inflation_radius:
        #     - Keeps the rover farther from obstacles.
        #     - May block narrow passages.
        #
        # • Smaller inflation_radius:
        #     - Allows tighter navigation.
        #     - Increases collision risk.
        #
        # • Higher cost_scaling_factor:
        #     - Cost drops more rapidly away from obstacles.
        #
        # • Lower cost_scaling_factor:
        #     - Produces a wider high-cost region.
        # ==========================================================

        inflation_radius: 0.45
        cost_scaling_factor: 2.5
